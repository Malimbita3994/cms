# Minimal RoadRunner config for Laravel Octane (local dev).
# Started via scripts/start-octane-roadrunner.ps1 — most options are overridden on the CLI.
version: '3'

rpc:
    listen: 'tcp://127.0.0.1:6001'

http:
    address: '127.0.0.1:8000'
    middleware:
        - static
    static:
        dir: public
        forbid:
            - .php
            - .htaccess

logs:
    mode: production
    output: stdout
    level: warn
